apiVersion: apps/v1
kind: Deployment
metadata:
  name: saathi-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saathi-frontend
  template:
    metadata:
      labels:
        app: saathi-frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/saathi-491606/saathi-frontend:v1
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: saathi-frontend-svc
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: saathi-frontend
