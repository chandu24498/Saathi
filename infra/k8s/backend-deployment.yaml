apiVersion: apps/v1
kind: Deployment
metadata:
  name: saathi-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saathi-backend
  template:
    metadata:
      labels:
        app: saathi-backend
    spec:
      containers:
      - name: backend
        image: gcr.io/saathi-491606/saathi-backend:v1
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: saathi-backend-svc
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: saathi-backend
